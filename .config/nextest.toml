# cargo-nextest configuration. The `test` CI leg runs under the `ci` profile
# (`cargo nextest run --profile ci`); local `cargo nextest run` uses `default`.
#
# Why nextest at all: the suite is ~700 tests spread across dozens of
# integration-test binaries (the bynkc/tests/fixtures/** corpus especially).
# `cargo test` runs those binaries sequentially; nextest runs one process pool
# across all of them, cutting the test leg's wall-clock. There are no rustdoc
# doctests in the tree (nextest cannot run those), so nothing is lost — the
# `doc_examples` gate is an ordinary `#[test]`, which nextest runs normally.

[profile.ci]
# Surface every failure in one run rather than stopping at the first, so a
# single red fixture doesn't mask the rest — mirrors the matrix's
# `fail-fast: false` intent at the individual-test level.
fail-fast = false

# One retry, applied suite-wide. The intent is to absorb the occasional
# cold-sandbox flake in the external shell-outs — the workerd boot and the
# `tsc` type-check — but that surface is deliberately NOT name-scoped: the
# tsc-verify path runs inside most `*_behaviour` binaries, whose test names
# don't contain "tsc", so a `filter = 'test(/tsc/)'` override would miss the
# bulk of it. A blanket retry is the honest expression of "any test may hit a
# cold-sandbox flake." It does not silently mask a genuinely intermittent
# product bug: nextest reports a retried-then-passed test as FLAKY in the run
# summary (status-level = fail keeps failures loud), so an emitter path or race
# that only sometimes fails still leaves a visible trace to chase.
retries = { backoff = "fixed", count = 1, delay = "1s" }

# CI output: compact while green, but print the full output of anything that
# failed (or was retried) at the end so a red run is diagnosable from the log.
failure-output = "final"
status-level = "fail"

[profile.default]
# Local runs keep the default (0) retries so flakes surface immediately.
retries = 0

version: 2
updates:
  # Rust workspace dependencies. Grouped into a single PR per run to keep the
  # noise down — the CI gates (clippy, workspace tests, audit) vet the bump.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    groups:
      cargo:
        patterns: ["*"]

  # The GitHub Actions pinned by SHA/tag in .github/workflows/.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      codeql-workflow:
        patterns:
          - "github/codeql-action/init"
          - "github/codeql-action/autobuild"
          - "github/codeql-action/analyze"

  # The npm-published tree-sitter grammar (a planned release channel).
  - package-ecosystem: npm
    directory: "/tree-sitter-bynk"
    schedule:
      interval: weekly

  # The VS Code extension's toolchain deps.
  - package-ecosystem: npm
    directory: "/vscode-bynk"
    schedule:
      interval: weekly

  # The @bynk/runtime package bundled into the compiler via include_str!.
  - package-ecosystem: npm
    directory: "/bynk-emit/runtime"
    schedule:
      interval: weekly

  # The in-browser playground (REPL). Its deploy job holds the Cloudflare token.
  - package-ecosystem: npm
    directory: "/playground"
    schedule:
      interval: weekly

  # The Astro/Starlight docs site. Its deploy job holds the Cloudflare token.
  - package-ecosystem: npm
    directory: "/site"
    schedule:
      interval: weekly
